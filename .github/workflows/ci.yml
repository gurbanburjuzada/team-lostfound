name: CI

on:
  pull_request:
    branches: [main, develop, feature/*, davud/*]
  push:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest-cov

      - name: Lint with ruff
        run: |
          ruff check src/ tests/ ai/ ui/
        continue-on-error: true

      - name: Type check with mypy
        run: |
          mypy src/ ai/ --ignore-missing-imports --no-error-summary
        continue-on-error: true

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=src --cov=ai --cov-report=term-missing --cov-fail-under=50 -v

      - name: Build Docker image
        run: |
          docker build -t team-lostfound:${{ github.sha }} .

      - name: Report image size
        run: |
          docker images team-lostfound:${{ github.sha }}
